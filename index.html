<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text To Speech Converter</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center px-3 py-4">

        <div class="app-container col-11 col-md-9 col-lg-7 mx-auto">

            <div class="app-heading text-center mb-4">
                <h1 class="display-3 fw-bold text-white text-stroke-lg mb-2">Text To Speech Converter</h1>
                <h3 class="fs-4 fw-medium text-white-50 text-stroke-sm">Enter Your Text and Convert into Speech</h3>
            </div>

            <div class="interaction-container position-relative w-100 shadow-lg rounded-4 overflow-hidden">
                <textarea id="textToConvert" placeholder="Enter text to convert into speech..." rows="6"
                    class="form-control text-control border-0 text-white p-3 p-sm-4" data-gramm="false"
                    data-lt-active="false" spellcheck="false"></textarea>

                <p class="error-para mb-0"></p>

                <button class="btn btn-light position-absolute convert-btn-layout shadow" id="convertBtn">
                    <i class="fa-solid fa-play"></i>
                </button>
            </div>

        </div>
    </div>

</body>

<script src="./index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
